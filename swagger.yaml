openapi: "3.0.3"
info:
  title: Work Entries API
  description: >
    API REST para la gestión de fichajes de empleados.
    La mayoría de endpoints requieren autenticación JWT (Bearer token).
    Los endpoints públicos son: POST /login_check, POST /users, y GET /docs.
  version: "1.1.3"

servers:
  - url: http://localhost:8080/api
    description: Entorno local (Docker)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # -----------------------------------------------------------------------
    # User
    # -----------------------------------------------------------------------
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          example: "018f1b2c-3d4e-7f89-a012-b3c4d5e6f789"
        name:
          type: string
          example: "María García"
        email:
          type: string
          format: email
          example: "maria@example.com"
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
          readOnly: true

    UserCreate:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: "María García"
        email:
          type: string
          format: email
          example: "maria@example.com"
        password:
          type: string
          format: password
          minLength: 8
          example: "S3cur3P@ssw0rd"

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    UserCollection:
      type: object
      properties:
        member:
          type: array
          items:
            $ref: '#/components/schemas/User'
        totalItems:
          type: integer
          example: 3
        view:
          type: object
          properties:
            "@id":
              type: string
            type:
              type: string
            first:
              type: string
            last:
              type: string
            next:
              type: string
            previous:
              type: string

    # -----------------------------------------------------------------------
    # WorkEntry
    # -----------------------------------------------------------------------
    WorkEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          example: "018f1b2c-aaaa-7f89-a012-b3c4d5e6f789"
        userId:
          type: string
          format: uuid
          example: "018f1b2c-3d4e-7f89-a012-b3c4d5e6f789"
        startDate:
          type: string
          format: date-time
          example: "2026-06-22T08:00:00+02:00"
        endDate:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-22T16:00:00+02:00"
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
          readOnly: true

    WorkEntryCreate:
      type: object
      required: [startDate]
      properties:
        startDate:
          type: string
          format: date-time
          example: "2026-06-22T08:00:00+02:00"
        endDate:
          type: string
          format: date-time
          nullable: true
          example: null

    WorkEntryUpdate:
      type: object
      properties:
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
          nullable: true

    WorkEntryCollection:
      type: object
      properties:
        member:
          type: array
          items:
            $ref: '#/components/schemas/WorkEntry'
        totalItems:
          type: integer
          example: 42
        view:
          type: object
          properties:
            "@id":
              type: string
            type:
              type: string
            first:
              type: string
            last:
              type: string
            next:
              type: string
            previous:
              type: string

    # -----------------------------------------------------------------------
    # Auth
    # -----------------------------------------------------------------------
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT token válido para autenticar el resto de peticiones

    Error:
      type: object
      properties:
        status:
          type: integer
        detail:
          type: string

    ValidationError:
      type: object
      properties:
        status:
          type: integer
          example: 422
        detail:
          type: string
          example: "name: This value should not be blank."

    OverlapError:
      type: object
      properties:
        status:
          type: integer
          example: 422
        detail:
          type: string
          example: "Work entry overlaps with an existing entry."

security:
  - bearerAuth: []

paths:
  # ---------------------------------------------------------------------------
  # Root
  # ---------------------------------------------------------------------------
  /:
    get:
      tags: [Info]
      summary: Información básica de la API
      security: []
      responses:
        "200":
          description: Nombre y versión de la API
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                    example: "Work Entries API"
                  version:
                    type: string
                    example: "1.1.3"

  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------
  /auth/revoke:
    post:
      tags: [Auth]
      summary: Revocar el token JWT actual (logout)
      description: >
        Añade el token actual a la lista de revocados. Cualquier petición posterior
        con ese token recibirá un 401, aunque el token no haya expirado todavía.
        Cada token tiene un `jti` (JWT ID) único, por lo que revocar un token no
        afecta a otras sesiones del mismo usuario.
      responses:
        "204":
          description: Token revocado correctamente
        "401":
          description: No autorizado (token ausente, inválido o ya revocado)

  /login_check:
    post:
      tags: [Auth]
      summary: Obtener token JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Token JWT generado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "401":
          description: Credenciales inválidas

  # ---------------------------------------------------------------------------
  # Users
  # ---------------------------------------------------------------------------
  /users:
    get:
      tags: [Users]
      summary: Listar usuarios (con filtros de nombre y email)
      parameters:
        - name: name
          in: query
          required: false
          description: Filtro parcial e insensible a mayúsculas sobre el nombre (e.g. "ali" encuentra "Alice")
          schema:
            type: string
        - name: email
          in: query
          required: false
          description: Filtro parcial e insensible a mayúsculas sobre el email (e.g. "example" encuentra "alice@example.com")
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Número de página (por defecto 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: itemsPerPage
          in: query
          required: false
          description: Elementos por página (por defecto 20, máximo 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Lista de usuarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCollection'
        "401":
          description: No autorizado
    post:
      tags: [Users]
      summary: Registrar nuevo usuario (público)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        "201":
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "422":
          description: Datos inválidos (nombre vacío, contraseña corta, email duplicado)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Users]
      summary: Obtener usuario por ID (solo el propio)
      responses:
        "200":
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: No autorizado
        "403":
          description: Prohibido — solo se puede consultar el propio perfil
        "404":
          description: Usuario no encontrado
    patch:
      tags: [Users]
      summary: Actualizar parcialmente el propio perfil
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        "200":
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: No autorizado
        "403":
          description: Prohibido — solo se puede editar el propio perfil
        "404":
          description: Usuario no encontrado
        "422":
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    put:
      tags: [Users]
      summary: Reemplazar el propio perfil completo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        "200":
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: No autorizado
        "403":
          description: Prohibido — solo se puede editar el propio perfil
        "404":
          description: Usuario no encontrado
        "422":
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      tags: [Users]
      summary: Eliminar el propio usuario (soft delete)
      responses:
        "204":
          description: Usuario eliminado (soft delete)
        "401":
          description: No autorizado
        "403":
          description: Prohibido — solo se puede eliminar el propio perfil
        "404":
          description: Usuario no encontrado

  # ---------------------------------------------------------------------------
  # Work Entries
  # ---------------------------------------------------------------------------
  /work-entries:
    get:
      tags: [WorkEntries]
      summary: Listar fichajes del usuario autenticado (con filtro de fechas y paginación)
      parameters:
        - name: startDate
          in: query
          required: false
          description: "Devuelve sólo entradas cuyo startDate sea >= este valor (ISO 8601, e.g. 2026-06-01T00:00:00Z)"
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          required: false
          description: "Devuelve sólo entradas cuyo startDate sea <= este valor (ISO 8601, e.g. 2026-06-30T23:59:59Z)"
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          description: Número de página (por defecto 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: itemsPerPage
          in: query
          required: false
          description: Elementos por página (por defecto 20, máximo 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Colección paginada de fichajes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkEntryCollection'
        "400":
          description: Formato de fecha inválido
        "401":
          description: No autorizado
    post:
      tags: [WorkEntries]
      summary: Crear fichaje manualmente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkEntryCreate'
      responses:
        "201":
          description: Fichaje creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkEntry'
        "401":
          description: No autorizado
        "422":
          description: El fichaje se solapa con uno existente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverlapError'

  /work-entries/clock-in:
    post:
      tags: [WorkEntries]
      summary: Iniciar fichaje (clock-in)
      description: Crea una nueva entrada con `startDate = now()` y `endDate = null`.
      responses:
        "201":
          description: Fichaje de entrada creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkEntry'
        "401":
          description: No autorizado

  /work-entries/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [WorkEntries]
      summary: Obtener fichaje por ID
      responses:
        "200":
          description: Fichaje encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkEntry'
        "401":
          description: No autorizado
        "403":
          description: Prohibido — el fichaje pertenece a otro usuario
        "404":
          description: Fichaje no encontrado
    put:
      tags: [WorkEntries]
      summary: Reemplazar fichaje completo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkEntryUpdate'
      responses:
        "200":
          description: Fichaje actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkEntry'
        "401":
          description: No autorizado
        "403":
          description: Prohibido — el fichaje pertenece a otro usuario
        "404":
          description: Fichaje no encontrado
        "422":
          description: Las nuevas fechas se solapan con otro fichaje existente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverlapError'
    patch:
      tags: [WorkEntries]
      summary: Actualizar parcialmente un fichaje
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: '#/components/schemas/WorkEntryUpdate'
      responses:
        "200":
          description: Fichaje actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkEntry'
        "401":
          description: No autorizado
        "403":
          description: Prohibido — el fichaje pertenece a otro usuario
        "404":
          description: Fichaje no encontrado
        "422":
          description: Las nuevas fechas se solapan con otro fichaje existente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverlapError'
    delete:
      tags: [WorkEntries]
      summary: Eliminar fichaje (soft delete)
      responses:
        "204":
          description: Fichaje eliminado (soft delete)
        "401":
          description: No autorizado
        "403":
          description: Prohibido — el fichaje pertenece a otro usuario
        "404":
          description: Fichaje no encontrado

  /work-entries/{id}/clock-out:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [WorkEntries]
      summary: Registrar salida (clock-out)
      description: Establece `endDate = now()` en el fichaje indicado.
      responses:
        "200":
          description: Fichaje actualizado con hora de salida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkEntry'
        "401":
          description: No autorizado
        "403":
          description: Prohibido — el fichaje pertenece a otro usuario
        "404":
          description: Fichaje no encontrado
        "422":
          description: El fichaje ya tiene registrada una hora de salida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
